repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix]
        files: ^apps/gm/
      - id: ruff-format
        files: ^apps/gm/

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        files: ^apps/gm/src/
        args: [--config-file=apps/gm/pyproject.toml]
        additional_dependencies:
          - pydantic>=2
          - pydantic-settings

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        files: ^(apps/web|packages/ws-schema)/
        types_or: [ts, tsx, javascript, json, yaml, markdown]

  - repo: local
    hooks:
      - id: eslint
        name: eslint
        language: node
        entry: pnpm -F web lint
        pass_filenames: false
        files: ^apps/web/src/

      - id: schema-check
        name: ws-schema check
        language: script
        entry: bash packages/ws-schema/scripts/check.sh
        pass_filenames: false
        files: ^(apps/gm/src/tacex_gm/ws/|apps/gm/src/tacex_gm/errors\.py|packages/ws-schema/)
