repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
        files: ^apps/gm/
      - id: ruff-format
        files: ^apps/gm/
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [typescript, tsx, javascript, jsx, json, yaml, markdown]
        files: ^(apps/web/|packages/)
