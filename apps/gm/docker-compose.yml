services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8000
      - CORS_ORIGINS=http://localhost:5173
    env_file:
      - .env
    volumes:
      - ./src:/app/src:ro
      - ./scenarios:/app/scenarios:ro
      - ./data:/app/data:ro
